name: Add a work (book) and its first recording
description: Add a book that is not yet in the database, together with one narration of it.
title: "[work] "
labels: ["data", "data:add-work"]
body:
  - type: markdown
    attributes:
      value: |
        Add a **work** (the abstract book) and its **first recording** (a specific
        narration). A work has no narrator or runtime of its own - those belong to
        the recording. If the book is already here and you only want to add another
        narration, use the **Add a recording** form instead.

        Provide **factual data only**. Do not paste a publisher blurb; any
        description must be your own words. See
        [CONTRIBUTING.md](https://github.com/kodestar/audiosilo-meta/blob/main/CONTRIBUTING.md).

  - type: markdown
    attributes:
      value: "## The work"

  - type: input
    id: work_title
    attributes:
      label: Title
      description: The book title, without series or edition text.
      placeholder: Harry Potter and the Philosopher's Stone
    validations:
      required: true

  - type: input
    id: work_subtitle
    attributes:
      label: Subtitle
      description: Optional.
    validations:
      required: false

  - type: input
    id: work_authors
    attributes:
      label: Author(s)
      description: One per line or comma-separated. Full names as credited.
      placeholder: J. K. Rowling
    validations:
      required: true

  - type: input
    id: work_language
    attributes:
      label: Language
      description: BCP-47 code (e.g. en, en-GB, de, fr).
      placeholder: en-GB
    validations:
      required: true

  - type: input
    id: work_first_published
    attributes:
      label: First published (year)
      description: Year the work was first published (not this recording's release).
      placeholder: "1997"
    validations:
      required: false

  - type: input
    id: work_series_name
    attributes:
      label: Series name
      description: Leave blank if the book is standalone.
      placeholder: Harry Potter
    validations:
      required: false

  - type: input
    id: work_series_position
    attributes:
      label: Series position
      description: A string, so half-numbers like 2.5 are allowed.
      placeholder: "1"
    validations:
      required: false

  - type: input
    id: work_isbn
    attributes:
      label: ISBN(s)
      description: Of the print/ebook edition, if known. One per line or comma-separated.
    validations:
      required: false

  - type: input
    id: work_wikidata
    attributes:
      label: Wikidata ID
      description: Optional (e.g. Q43361).
    validations:
      required: false

  - type: input
    id: work_openlibrary
    attributes:
      label: Open Library ID
      description: Optional (e.g. OL82563W).
    validations:
      required: false

  - type: markdown
    attributes:
      value: "## The first recording"

  - type: input
    id: rec_narrators
    attributes:
      label: Narrator(s)
      description: One per line or comma-separated. This is the field the project exists for.
      placeholder: Stephen Fry
    validations:
      required: true

  - type: dropdown
    id: rec_abridged
    attributes:
      label: Abridged?
      options:
        - "Unabridged"
        - "Abridged"
    validations:
      required: true

  - type: input
    id: rec_runtime_min
    attributes:
      label: Runtime (minutes)
      description: Total runtime of this recording, in whole minutes.
      placeholder: "498"
    validations:
      required: false

  - type: input
    id: rec_release_date
    attributes:
      label: Release date
      description: This recording's release date (YYYY-MM-DD if known).
      placeholder: "1999-11-01"
    validations:
      required: false

  - type: input
    id: rec_publisher
    attributes:
      label: Publisher
      description: The audiobook publisher of this recording.
      placeholder: Pottermore Publishing
    validations:
      required: false

  - type: textarea
    id: rec_asins
    attributes:
      label: ASIN(s) with region
      description: 'One per line as "region: ASIN". ASINs are region-scoped, so include the region.'
      placeholder: |
        US: B017V4IM1G
        GB: B017WPFA2A
    validations:
      required: false

  - type: input
    id: rec_isbns
    attributes:
      label: Audiobook ISBN(s)
      description: If this recording has its own ISBN(s). Optional.
    validations:
      required: false

  - type: input
    id: rec_cover_url
    attributes:
      label: Cover image URL
      description: A URL only - we never store image files. Point at the publisher's or retailer's hosting.
      placeholder: https://m.media-amazon.com/images/I/....jpg
    validations:
      required: false

  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Where did this information come from? A store page, your own library export, etc. Required for provenance.
      placeholder: |
        Audible US product page for B017V4IM1G (read 2026-07-11)
    validations:
      required: true

  - type: checkboxes
    id: factual
    attributes:
      label: Factual data
      options:
        - label: This submission is factual data (no publisher blurb or copyrighted description).
          required: true

  - type: checkboxes
    id: cc0
    attributes:
      label: Public domain dedication
      options:
        - label: I dedicate this contribution to the public domain under CC0-1.0, and I have the right to do so.
          required: true
