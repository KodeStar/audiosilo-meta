name: Add recaps (story so far)
description: Add position-keyed "story so far" recaps for a work that is already in the database.
title: "[recaps] "
labels: ["data", "data:recaps"]
body:
  - type: markdown
    attributes:
      value: |
        Add a **recaps** sidecar - position-keyed "story so far" summaries for a
        work that is already in the database. This is the community **CC BY-SA
        3.0** layer, not the CC0 factual core, so it carries different rules than
        the other forms.

        The easiest way to produce a valid file is the guided builder at
        [meta.audiosilo.app/build](https://meta.audiosilo.app/build) - it counts
        against the length caps, keeps the canonical format, and lets you download
        a ready `recaps.json` to attach below. Full authoring guidance is in
        [AUTHORING.md](https://github.com/kodestar/audiosilo-meta/blob/main/AUTHORING.md).

        **Own words only, neutral reference-guide voice.** Summarize, do not
        retell; the length caps exist for a legal reason. Each recap may reveal
        everything up to and including its `through` chapter and nothing after, and
        the **final** chaptered entry must state the actual ending plainly - never
        a tease. Positions are the book's own (logical) chapter numbers; a
        chapter-0 series recap is the "previously, in earlier books" entry.

  - type: input
    id: work_ref
    attributes:
      label: The work
      description: Link to the existing work here, or its slug / path in data/works/, so we know which book these recaps are for.
      placeholder: https://meta.audiosilo.app/work?id=a-deadly-education
    validations:
      required: true

  - type: textarea
    id: attachment
    attributes:
      label: The recaps.json file
      description: Drag the file you downloaded from the builder into this box to attach it (GitHub uploads it and inserts a link). If you wrote it by hand, you can paste its contents instead.
      placeholder: Drop recaps.json here...
    validations:
      required: true

  - type: checkboxes
    id: own_words
    attributes:
      label: Own words
      options:
        - label: Every recap is my own words - no verbatim or near-verbatim text from the book, its jacket copy, or any wiki - and stays within the length caps.
          required: true

  - type: checkboxes
    id: neutral_voice
    attributes:
      label: Neutral voice
      options:
        - label: The recaps use a neutral reference-guide voice - no jokes, editorializing, profanity, or value judgements - and the final entry states the actual ending.
          required: true

  - type: checkboxes
    id: cc_by_sa
    attributes:
      label: License
      options:
        - label: I license this contribution under CC BY-SA 3.0, and I have the right to do so.
          required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Anything a reviewer should know (sources, uncertainty, which chapters you have listened through). Optional.
    validations:
      required: false
