name: Import a library export
description: Attach an OpenAudible export, Libation export, or folder scan so we can ingest the factual fields in bulk.
title: "[import] "
labels: ["data", "data:import"]
body:
  - type: markdown
    attributes:
      value: |
        Have a library export? Attach it and we will ingest the **factual fields**
        only - titles, authors, narrators, series order, runtimes, ASINs, chapter
        titles and timestamps.

        **How to attach the file:** drag your export file into the
        **Additional notes** box below, or paste its contents there. GitHub will
        upload it and insert a link.

        Supported exports:

        - **OpenAudible** - the `books.json` file.
        - **Libation** - a JSON export (Export menu > Export Library > save as JSON).
        - **Folder scan** - the JSON produced by the repo's `metascan` tool.

        **What we ingest and what we drop.** Only factual fields are imported.
        **Personal fields** (purchase dates, ratings, file paths, and any
        library-private data) and **publisher marketing copy** (the
        `description` / `summary` fields, which are copyrighted) are **discarded**
        and never enter the repository. If you would rather not share personal
        fields at all, scrub them from the file before attaching it.

  - type: dropdown
    id: export_type
    attributes:
      label: Export type
      options:
        - "OpenAudible (books.json)"
        - "Libation (JSON)"
        - "Folder scan (metascan JSON)"
        - "Other / not sure"
    validations:
      required: true

  - type: textarea
    id: attachment
    attributes:
      label: Additional notes
      description: Drag the export file here to attach it (or paste its contents), plus anything we should know.
      placeholder: Drop books.json here...
    validations:
      required: true

  - type: checkboxes
    id: own_library
    attributes:
      label: Your own library
      options:
        - label: This is my own library export, not a redistribution of someone else's database.
          required: true

  - type: checkboxes
    id: cc0
    attributes:
      label: Public domain dedication
      options:
        - label: I dedicate the factual data in this contribution to the public domain under CC0-1.0, and I have the right to do so.
          required: true
