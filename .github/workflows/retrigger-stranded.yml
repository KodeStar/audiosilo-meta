name: retrigger stranded intake issues

on:
  push:
    branches: [main]
    paths: [.github/workflows/retrigger-stranded.yml]

permissions:
  issues: write

jobs:
  retrigger:
    runs-on: ubuntu-latest
    steps:
      - name: Reapply routing labels
        uses: actions/github-script@v7
        with:
          script: |
            const routes = [
              [59, "data:characters"],
              [63, "data:recaps"],
              [90, "data:recaps"],
              [100, "data:characters"],
              [101, "data:recaps"],
              [102, "data:characters"],
              [106, "data:recaps"],
              [112, "data:characters"],
            ];
            for (const [issue_number, label] of routes) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  name: label,
                });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                labels: [label],
              });
              core.info(`retriggered #${issue_number} (${label})`);
            }
