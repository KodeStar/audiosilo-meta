name: check

# Validate every pull request and every push to main.
#
# SECURITY: this uses the plain `pull_request` trigger, NOT
# `pull_request_target`, so fork pull requests run with a read-only token and no
# access to secrets. Do not switch to `pull_request_target` (the "pwn request"
# supply-chain pattern) - any privileged follow-up must live in a separate
# workflow that consumes only artifacts.
on:
  pull_request:
  push:
    branches: [main]

# Least privilege: read the code, nothing more. No secrets are needed to validate.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Validate data (metacheck)
        run: go run ./cmd/metacheck

      - name: Check canonical formatting (metafmt)
        run: go run ./cmd/metafmt --check

  # Build and typecheck the marketing/search site. This job is intentionally
  # unconditional (branch protection can require it), but it self-skips cleanly
  # when site/ is absent, so it stays green before the site lands and gates it
  # once it does. No `paths:` filter - a required check must always report.
  site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for site/
        id: site
        run: |
          if [ -f site/package.json ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "site/ not present yet; skipping."
          fi

      - name: Set up Node
        if: steps.site.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install, build, typecheck, and test the site
        if: steps.site.outputs.exists == 'true'
        working-directory: site
        run: |
          yarn install --frozen-lockfile
          yarn build
          yarn run check
          yarn test
